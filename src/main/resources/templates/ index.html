<!DOCTYPE html>
<html>
<head>
    <title>Store Finder</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD4YRgRFrQfRSoqZG7OdKXw01aNStlLlu0"></script>
</head>
<body>

<h2>Nearby Stores</h2>
<div id="map" style="height:500px;width:100%"></div>

<script>
    function initMap() {

        const userLocation = { lat: 17.3850, lng: 78.4867 };

        const map = new google.maps.Map(document.getElementById("map"), {
            zoom: 12,
            center: userLocation,
        });

        // User marker
        new google.maps.Marker({
            position: userLocation,
            map: map,
            title: "You are here"
        });

        // Call backend
        fetch("http://localhost:8081/api/stores/nearby?lat=17.3850&lon=78.4867")
            .then(res => res.json())
            .then(data => {
                data.forEach(store => {
                    new google.maps.Marker({
                        position: { lat: store.latitude, lng: store.longitude },
                        map: map,
                        title: store.name
                    });
                });
            });
    }

    window.onload = initMap;
</script>

</body>
</html>
